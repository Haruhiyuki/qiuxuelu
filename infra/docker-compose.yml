# 本地开发基础设施：在仓库根目录执行
#   docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: postgres:18-alpine
    container_name: harublog-postgres
    environment:
      POSTGRES_USER: harublog
      POSTGRES_PASSWORD: harublog
      POSTGRES_DB: harublog
    ports:
      - '5432:5432'
    volumes:
      # PG18 镜像要求挂载点在 /var/lib/postgresql（数据在其子目录），便于 pg_upgrade --link
      - ../.docker-data/pg18:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U harublog']
      interval: 5s
      timeout: 3s
      retries: 10

  # 块粒度中文搜索索引（charabia 内置 jieba 分词）；非真相源，可随时从 PG 全量重建（worker reindex）
  meilisearch:
    image: getmeili/meilisearch:v1.41
    container_name: harublog-meilisearch
    environment:
      MEILI_MASTER_KEY: dev-master-key
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - ../.docker-data/meilisearch:/meili_data
    healthcheck:
      test: ['CMD', 'sh', '-c', 'curl -fsS http://localhost:7700/health || wget -qO- http://localhost:7700/health']
      interval: 5s
      timeout: 3s
      retries: 10
