# 本地开发基础设施：在仓库根目录执行
#   docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: postgres:18-alpine
    container_name: harublog-postgres
    environment:
      POSTGRES_USER: harublog
      POSTGRES_PASSWORD: harublog
      POSTGRES_DB: harublog
    ports:
      - '5432:5432'
    volumes:
      # PG18 镜像要求挂载点在 /var/lib/postgresql（数据在其子目录），便于 pg_upgrade --link
      - ../.docker-data/pg18:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U harublog']
      interval: 5s
      timeout: 3s
      retries: 10

  # 媒体对象存储（S3 兼容）：图片本体落此，元数据落 PG media 表；生产可换任意 S3
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: harublog-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: harublog
      MINIO_ROOT_PASSWORD: harublog-minio-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ../.docker-data/minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 10

  # 自动建桶：MinIO 起来后创建 harublog-media 私有桶（仅经 web 的 /api/media 代理读取）
  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    container_name: harublog-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 harublog harublog-minio-secret &&
      mc mb --ignore-existing local/harublog-media &&
      echo 'bucket ready'
      "

  # 块粒度中文搜索索引（charabia 内置 jieba 分词）；非真相源，可随时从 PG 全量重建（worker reindex）
  meilisearch:
    image: getmeili/meilisearch:v1.41
    container_name: harublog-meilisearch
    environment:
      MEILI_MASTER_KEY: dev-master-key
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - ../.docker-data/meilisearch:/meili_data
    healthcheck:
      test: ['CMD', 'sh', '-c', 'curl -fsS http://localhost:7700/health || wget -qO- http://localhost:7700/health']
      interval: 5s
      timeout: 3s
      retries: 10
